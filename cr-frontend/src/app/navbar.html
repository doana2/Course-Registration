<header class="nav">
  <a routerLink="/courses" class="brand">CourseReg</a>
  <nav class="links" *ngIf="loggedIn; else out">
    <a routerLink="/courses" *ngIf="isStudent">Courses</a>
    <a routerLink="/dashboard" *ngIf="isStudent">My Schedule</a>
    <a routerLink="/instructor" *ngIf="isInstructorOrAdmin">Instructor</a>
    <a routerLink="/admin" *ngIf="isAdmin">Admin</a>
    <button class="btn" (click)="logout()">Logout</button>
  </nav>
  <ng-template #out>
    <nav class="links"><a routerLink="/login">Login</a></nav>
  </ng-template>
</header>
